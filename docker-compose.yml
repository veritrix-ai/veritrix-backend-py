services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./scripts/clickhouse-default-user.xml:/etc/clickhouse-server/users.d/default-user.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  clickhouse-init:
    image: clickhouse/clickhouse-server:24.8
    depends_on:
      - clickhouse
    volumes:
      - ./scripts/init_clickhouse.sql:/init/init_clickhouse.sql:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        until clickhouse-client --host clickhouse --query "SELECT 1" >/dev/null 2>&1; do
          sleep 1
        done
        clickhouse-client --host clickhouse --multiquery < /init/init_clickhouse.sql

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: agentops
      POSTGRES_DB: agentops
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro

volumes:
  clickhouse_data:
  postgres_data:
