# Veritrix backend — Render Blueprint
# https://render.com/docs/blueprint-spec
#
# This file lives at the root of the backend git repo. On Render, set
# Blueprint Path to `render.yaml` (repo root).
#
# After first deploy:
# 1. Set Clerk + CORS values prompted in the dashboard (sync: false).
# 2. Run scripts/init_postgres.sql against the Render Postgres instance once
#    (Render does not auto-apply that init script).
#    Existing databases also need scripts/add_onboarding_profiles.sql and
#    scripts/add_clerk_org_id.sql applied once.
# 3. Ingest creates the ClickHouse database + spans table on startup
#    (ensure_schema). Do not set CLICKHOUSE_* init env vars on the ClickHouse
#    service itself — that breaks the official entrypoint on Render.

databases:
  - name: veritrix-postgres
    plan: free
    region: singapore
    databaseName: veritrix
    user: veritrix
    # Private network only — APIs connect via Render internal DNS
    ipAllowList: []

envVarGroups:
  - name: veritrix-secrets
    envVars:
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      # Browser origins allowed to call the App API (comma-separated).
      - key: CORS_ORIGINS
        value: https://veritrix-ui.vercel.app,https://app.veritrix.xyz

  # Used by ingest + app API only — never attach to the ClickHouse service.
  - name: veritrix-clickhouse-creds
    envVars:
      - key: CLICKHOUSE_DB
        value: veritrix
      - key: CLICKHOUSE_USER
        value: default
      # Passwordless over Render private network (users.d config in Dockerfile).
      - key: CLICKHOUSE_PASSWORD
        value: ""

services:
  # -----------------------------------------------------------------------
  # ClickHouse — private service (HTTP :8123). Not offered as managed DB.
  # -----------------------------------------------------------------------
  # Note: Render free plan is not available for private services (pserv).
  # ClickHouse must stay on starter (or higher).
  #
  # Do NOT set CLICKHOUSE_DB / CLICKHOUSE_USER / CLICKHOUSE_PASSWORD here —
  # the official entrypoint tries `kill` during init and fails on Render.
  - type: pserv
    name: veritrix-clickhouse
    runtime: docker
    # ClickHouse OOMs on starter (512Mi). Keep at least standard (~2Gi).
    plan: standard
    region: singapore
    dockerfilePath: ./Dockerfile.clickhouse
    dockerContext: ./
    disk:
      name: clickhouse-data
      mountPath: /var/lib/clickhouse
      sizeGB: 1
    envVars:
      # Tell Render which port this service listens on (HTTP interface)
      - key: PORT
        value: "8123"

  # -----------------------------------------------------------------------
  # Ingest API — SDK writes (public)
  # -----------------------------------------------------------------------
  - type: web
    name: veritrix-ingest
    runtime: python
    plan: free
    region: singapore
    buildFilter:
      paths:
        - api/**
        - ingest/**
        - shared/**
        - scripts/**
        - pyproject.toml
        - render.yaml
        - Dockerfile.clickhouse
    buildCommand: |
      pip install "fastapi>=0.111.0,<0.117.0" "starlette>=0.40.0,<0.48.0" \
        "uvicorn[standard]>=0.30.0" "pydantic>=2.0" "pydantic-settings>=2.0" \
        "sqlalchemy[asyncio]>=2.0" "asyncpg>=0.29.0" "httpx>=0.27.0" \
        "PyJWT>=2.8.0" "cryptography>=42.0.0" "greenlet>=3.0.0"
    # Render DATABASE_URL is postgresql://…; SQLAlchemy needs +asyncpg
    startCommand: |
      bash -c 'case "$DATABASE_URL" in
        postgres://*) DATABASE_URL="postgresql+asyncpg://${DATABASE_URL#postgres://}" ;;
        postgresql://*) DATABASE_URL="postgresql+asyncpg://${DATABASE_URL#postgresql://}" ;;
      esac
      export DATABASE_URL
      exec env PYTHONPATH=. uvicorn ingest.main:app --host 0.0.0.0 --port "$PORT"'
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: veritrix-postgres
          property: connectionString
      - key: CLICKHOUSE_HOST
        fromService:
          name: veritrix-clickhouse
          type: pserv
          property: host
      - key: CLICKHOUSE_PORT
        value: "8123"
      - fromGroup: veritrix-clickhouse-creds
      - key: INGEST_RATE_LIMIT_PER_MINUTE
        value: "1000"

  # -----------------------------------------------------------------------
  # App API — dashboard reads (public)
  # -----------------------------------------------------------------------
  - type: web
    name: veritrix-api
    runtime: python
    plan: free
    region: singapore
    buildFilter:
      paths:
        - api/**
        - ingest/**
        - shared/**
        - scripts/**
        - pyproject.toml
        - render.yaml
        - Dockerfile.clickhouse
    buildCommand: |
      pip install "fastapi>=0.111.0,<0.117.0" "starlette>=0.40.0,<0.48.0" \
        "uvicorn[standard]>=0.30.0" "pydantic>=2.0" "pydantic-settings>=2.0" \
        "sqlalchemy[asyncio]>=2.0" "asyncpg>=0.29.0" "httpx>=0.27.0" \
        "PyJWT>=2.8.0" "cryptography>=42.0.0" "greenlet>=3.0.0"
    startCommand: |
      bash -c 'case "$DATABASE_URL" in
        postgres://*) DATABASE_URL="postgresql+asyncpg://${DATABASE_URL#postgres://}" ;;
        postgresql://*) DATABASE_URL="postgresql+asyncpg://${DATABASE_URL#postgresql://}" ;;
      esac
      export DATABASE_URL
      exec env PYTHONPATH=. uvicorn api.main:app --host 0.0.0.0 --port "$PORT"'
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: veritrix-postgres
          property: connectionString
      - key: CLICKHOUSE_HOST
        fromService:
          name: veritrix-clickhouse
          type: pserv
          property: host
      - key: CLICKHOUSE_PORT
        value: "8123"
      - fromGroup: veritrix-clickhouse-creds
      - fromGroup: veritrix-secrets
